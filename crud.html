<script>
window.addEventListener('DOMContentLoaded', async () => {
  // 1. Elementos e Variáveis Iniciais
  const botao = document.getElementById('botao-modo');
  if (!botao) {
    console.error('Botão não encontrado! Verifique o ID "botao-modo" no HTML.');
    return;
  }

  // 2. Obter dados do usuário
  const usuario = JSON.parse(sessionStorage.getItem("usuarioCorrente")) || {};
  const login = usuario?.login?.toLowerCase();

  if (!login) {
    console.warn('Nenhum usuário logado encontrado.');
    return;
  }

  // 3. Variável para armazenar preferência
  let prefUsuario = null;

  // 4. Função para aplicar tema (versão melhorada)
  function aplicarModo(tema) {
    const estiloId = 'modo-escuro-estilos';
    const body = document.body;

    // Remove estilo existente para evitar duplicação
    const estiloExistente = document.getElementById(estiloId);
    if (estiloExistente) estiloExistente.remove();

    if (tema === 'dark') {
      // Cria novo estilo
      const estiloEscuro = document.createElement('style');
      estiloEscuro.id = estiloId;
estiloEscuro.textContent = `
  body.dark-mode {
    background-color: #121212 !important;
    color: #f0f0f0 !important;
    transition: all 0.3s ease;
  }

  body.dark-mode a {
    color: #90caf9 !important;
  }

  body.dark-mode button {
    background-color: #333 !important;
    color: white !important;
    border-color: #555 !important;
  }

  body.dark-mode input,
  body.dark-mode select,
  body.dark-mode textarea {
    background-color: #252525 !important;
    color: white !important;
    border-color: #444 !important;
  }

  /* Exclusão do modo escuro na área "sem-tema" */
  body.dark-mode .sem-tema,
  body.dark-mode .sem-tema * {
    background-color: white !important;
    color: black !important;
    border-color: #ccc !important;
    box-shadow: none !important;
    filter: none !important;
  }



`;

      document.head.appendChild(estiloEscuro);
      body.classList.add('dark-mode');
      botao.textContent = 'MODO CLARO';
      console.log('Modo escuro ativado');
    } else {
      body.classList.remove('dark-mode');
      botao.textContent = 'MODO ESCURO';
      console.log('Modo claro ativado');
    }
  }

  // 5. Função para salvar preferência (com tratamento de erro)
  async function salvarPreferencia(tema) {
    try {
      if (!login) {
        console.error('Tentativa de salvar preferência sem login');
        return;
      }

      const payload = {
        login: login,
        theme: tema
      };

      if (prefUsuario) {
        // Atualização existente
        const response = await fetch(`http://localhost:3000/DarkLight/${prefUsuario.id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...payload, id: prefUsuario.id })
        });
        
        if (!response.ok) throw new Error('Falha ao atualizar preferência');
        console.log('Preferência atualizada com sucesso');
      } else {
        // Nova entrada
        const response = await fetch('http://localhost:3000/DarkLight', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        if (!response.ok) throw new Error('Falha ao criar preferência');
        prefUsuario = await response.json();
        console.log('Preferência criada com sucesso');
      }
    } catch (error) {
      console.error('Erro ao salvar preferência:', error);
    }
  }

  // 6. Carregar preferência inicial (com fallback)
  async function carregarPreferenciaInicial() {
    try {
      const response = await fetch(`http://localhost:3000/DarkLight?login=${login}`);
      if (!response.ok) throw new Error('Falha na requisição');
      
      const prefs = await response.json();
      console.log('Preferências encontradas:', prefs);

      if (prefs.length > 0 && prefs[0].theme) {
        prefUsuario = prefs[0];
        aplicarModo(prefUsuario.theme);
      } else {
        // Fallback: usar preferência do sistema ou light mode
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        aplicarModo(prefersDark ? 'dark' : 'light');
        console.log('Usando preferência do sistema:', prefersDark ? 'dark' : 'light');
      }
    } catch (error) {
      console.error('Erro ao carregar preferência:', error);
      aplicarModo('light'); // Fallback seguro
    }
  }

  // 7. Evento do botão (com tratamento de erro)
  botao.addEventListener('click', async () => {
    try {
      const modoAtual = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
      const novoTema = modoAtual === 'dark' ? 'light' : 'dark';
      
      aplicarModo(novoTema);
      await salvarPreferencia(novoTema);
    } catch (error) {
      console.error('Erro ao alternar modo:', error);
    }
  });

  // 8. Inicialização
  await carregarPreferenciaInicial();
});
</script>

  document.addEventListener("DOMContentLoaded", () => {

        if (userObj && userObj.login) {
          nomeLogin.textContent = userObj.login.toUpperCase();
        }
      } catch (e) {
        nomeLogin.textContent = "LOGIN";
      }
    } else {
      nomeLogin.textContent = "LOGIN";
    }
  });
</script>




  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const toggleCheckbox = document.getElementById("darkModeToggle");
      const userId = 1;

      function applyTheme(theme) {
        document.body.classList.remove("light", "dark");
        document.body.classList.add(theme);
        toggleCheckbox.checked = theme === "dark";
      }

      fetch(`http://localhost:3000/userPreferences/${userId}`)
        .then(res => res.json())
        .then(data => {
          applyTheme(data.theme || "light");
        })
        .catch(err => {
          console.error("Erro ao carregar tema:", err);
          applyTheme("light");
        });

      toggleCheckbox.addEventListener("change", () => {
        const newTheme = toggleCheckbox.checked ? "dark" : "light";
        applyTheme(newTheme);

        fetch(`http://localhost:3000/userPreferences/${userId}`, {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ theme: newTheme })
        });
      });
    });

<script>
  document.getElementById("button_voltar").addEventListener("click", function () {
            window.location.href = "index.html";
        });
        document.getElementById("button_rot").addEventListener("click", function () {
            window.location.href = "ver.index.html";
        });

        // 1. Primeiro as constantes e variáveis globais
        const rota = 'http://localhost:3000/roteiros';
        const form = document.getElementById('roteiroForm');
        const list = document.getElementById('listaRoteiros');

        // 2. Função para pegar o usuário logado
        function getLoggedInUser() {
            const usuarioSalvo = sessionStorage.getItem("usuarioCorrente");
            if (!usuarioSalvo) {
                alert("Você precisa estar logado para acessar esta funcionalidade.");
                window.location.href = "login.html";
                return null;
            }
            return JSON.parse(usuarioSalvo);
        }

        // 3. Funções CRUD
        async function loadList() {
            const usuario = getLoggedInUser();
            if (!usuario) return;

            try {
                const res = await fetch(rota);
                const arr = await res.json();
                const roteirosDoUsuario = arr.filter(r => r.login === usuario.login);

                if (list) {
                    list.innerHTML = roteirosDoUsuario.map(r => `
                        <li>
                            <span>${r.cidade}, ${r.estado} — ${r.ida} a ${r.volta}</span>
                            <div>
                                <button onclick="ver(${r.id})"><i class="fas fa-eye"></i> Ver</button>
                                <button onclick="edit(${r.id})"><i class="fas fa-edit"></i> Editar</button>
                                <button onclick="excl(${r.id})"><i class="fas fa-trash"></i> Excluir</button>
                            </div>
                        </li>
                    `).join('');
                }
            } catch (error) {
                console.error("Erro ao carregar roteiros:", error);
            }
        }

        window.ver = (id) => {
            window.location.href = `ver.index.html?id=${id}`;
        };

        window.edit = async (id) => {
            const usuario = getLoggedInUser();
            if (!usuario) return;

            try {
                const res = await fetch(`${rota}/${id}`);
                if (!res.ok) throw new Error('Roteiro não encontrado');
                
                const r = await res.json();
                
                if (r.login !== usuario.login) {
                    alert("Você não tem permissão para editar este roteiro.");
                    return;
                }

                // Preenche o formulário
                form.id.value = r.id;
                form.ida.value = r.ida;
                form.volta.value = r.volta;
                form.pessoas.value = r.pessoas;
                form.orcamento.value = r.orcamento;
                form.estado.value = r.estado;
                atualizarCidades();
                setTimeout(() => form.cidade.value = r.cidade, 100);

                ['pet', 'piscina', 'quartos', 'garagem'].forEach(name => {
                    const value = Array.isArray(r[name]) ? r[name][0] : r[name];
                    document.querySelector(`input[name="${name}"][value="${value}"]`).checked = true;
                });

                window.scrollTo(0, 0);
            } catch (error) {
                alert(error.message);
            }
        };

        window.excl = async (id) => {
            const usuario = getLoggedInUser();
            if (!usuario) return;

            if (!confirm('Deseja realmente excluir este roteiro?')) return;

            try {
                const resRoteiro = await fetch(`${rota}/${id}`);
                if (!resRoteiro.ok) throw new Error("Roteiro não encontrado");
                
                const roteiro = await resRoteiro.json();
                
                if (roteiro.login !== usuario.login) {
                    alert("Você não tem permissão para excluir este roteiro.");
                    return;
                }

                const res = await fetch(`${rota}/${id}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('Erro ao excluir roteiro');
                
                alert('Roteiro excluído!');
                loadList();
                form.reset();
            } catch (error) {
                alert(error.message);
            }
        };

        // 4. Event Listener do formulário
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const usuario = getLoggedInUser();
            if (!usuario) return;

            const id = form.id.value ? Number(form.id.value) : null;
            const dados = {
                ida: form.ida.value,
                volta: form.volta.value,
                pessoas: Number(form.pessoas.value),
                orcamento: Number(form.orcamento.value),
                estado: form.estado.value,
                cidade: form.cidade.value,
                pet: form.pet.value,
                piscina: form.piscina.value,
                quartos: form.quartos.value,
                garagem: form.garagem.value,
                login: usuario.login
            };

            try {
                const url = id ? `${rota}/${id}` : rota;
                const method = id ? 'PUT' : 'POST';
                
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                if (!res.ok) throw new Error(id ? 'Erro ao atualizar' : 'Erro ao criar');

                alert(id ? 'Roteiro atualizado!' : 'Roteiro criado!');
                form.reset();
                loadList();
            } catch (error) {
                alert(error.message);
            }
        });

        // 5. Funções auxiliares (como atualizarCidades)
        function atualizarCidades() {
            // Sua implementação existente
        }

        // 6. Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            loadList();
            // Outras inicializações necessárias
        });
    </script>

    function atualizarCidades() {

          const opt = document.createElement("option");
