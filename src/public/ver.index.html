  <style>

    .roteiro-acoes {

    .btn-acao {

    .btn-ver:hover {

    }

    .btn-editar {

    }

    .btn-editar:hover {

    }

    .btn-excluir {
      background-color: #dc3545;
    }

      background-color: #c82333;
    }

    .sem-roteiros {
      text-align: center;
      grid-column: 1 / -1;
      padding: 40px;

    .sem-roteiros i {

    /* Estilos para o modo escuro */

    }

      color: #ddd;

<script>
window.addEventListener('DOMContentLoaded', async () => {
  // 1. Elementos e Variáveis Iniciais
  const botao = document.getElementById('botao-modo');
  if (!botao) {
    console.error('Botão não encontrado! Verifique o ID "botao-modo" no HTML.');
    return;
  }

  // 2. Obter dados do usuário
  const usuario = JSON.parse(sessionStorage.getItem("usuarioCorrente")) || {};
  const login = usuario?.login?.toLowerCase();

  if (!login) {
    console.warn('Nenhum usuário logado encontrado.');
    return;
  }

  // 3. Variável para armazenar preferência
  let prefUsuario = null;

  // 4. Função para aplicar tema (versão melhorada)
  function aplicarModo(tema) {
    const estiloId = 'modo-escuro-estilos';
    const body = document.body;

    // Remove estilo existente para evitar duplicação
    const estiloExistente = document.getElementById(estiloId);
    if (estiloExistente) estiloExistente.remove();

    if (tema === 'dark') {
      // Cria novo estilo
      const estiloEscuro = document.createElement('style');
      estiloEscuro.id = estiloId;
estiloEscuro.textContent = `
  body.dark-mode {
    background-color: #121212 !important;
    color: #f0f0f0 !important;
    transition: all 0.3s ease;
  }

  body.dark-mode a {
    color: #90caf9 !important;
  }

  body.dark-mode button {
    background-color: #333 !important;
    color: white !important;
    border-color: #555 !important;
  }

  body.dark-mode input,
  body.dark-mode select,
  body.dark-mode textarea {
    background-color: #252525 !important;
    color: white !important;
    border-color: #444 !important;
  }

  /* Exclusão do modo escuro na área "sem-tema" */
  body.dark-mode .sem-tema,
  body.dark-mode .sem-tema * {
    background-color: white !important;
    color: black !important;
    border-color: #ccc !important;
    box-shadow: none !important;
    filter: none !important;
  }



`;

      document.head.appendChild(estiloEscuro);
      body.classList.add('dark-mode');
      botao.textContent = 'MODO CLARO';
      console.log('Modo escuro ativado');
    } else {
      body.classList.remove('dark-mode');
      botao.textContent = 'MODO ESCURO';
      console.log('Modo claro ativado');
    }
  }

  // 5. Função para salvar preferência (com tratamento de erro)
  async function salvarPreferencia(tema) {
    try {
      if (!login) {
        console.error('Tentativa de salvar preferência sem login');
        return;
      }

      const payload = {
        login: login,
        theme: tema
      };

      if (prefUsuario) {
        // Atualização existente
        const response = await fetch(`http://localhost:3000/DarkLight/${prefUsuario.id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...payload, id: prefUsuario.id })
        });
        
        if (!response.ok) throw new Error('Falha ao atualizar preferência');
        console.log('Preferência atualizada com sucesso');
      } else {
        // Nova entrada
        const response = await fetch('http://localhost:3000/DarkLight', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        if (!response.ok) throw new Error('Falha ao criar preferência');
        prefUsuario = await response.json();
        console.log('Preferência criada com sucesso');
      }
    } catch (error) {
      console.error('Erro ao salvar preferência:', error);
    }
  }

  // 6. Carregar preferência inicial (com fallback)
  async function carregarPreferenciaInicial() {
    try {
      const response = await fetch(`http://localhost:3000/DarkLight?login=${login}`);
      if (!response.ok) throw new Error('Falha na requisição');
      
      const prefs = await response.json();
      console.log('Preferências encontradas:', prefs);

      if (prefs.length > 0 && prefs[0].theme) {
        prefUsuario = prefs[0];
        aplicarModo(prefUsuario.theme);
      } else {
        // Fallback: usar preferência do sistema ou light mode
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        aplicarModo(prefersDark ? 'dark' : 'light');
        console.log('Usando preferência do sistema:', prefersDark ? 'dark' : 'light');
      }
    } catch (error) {
      console.error('Erro ao carregar preferência:', error);
      aplicarModo('light'); // Fallback seguro
    }
  }

  // 7. Evento do botão (com tratamento de erro)
  botao.addEventListener('click', async () => {
    try {
      const modoAtual = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
      const novoTema = modoAtual === 'dark' ? 'light' : 'dark';
      
      aplicarModo(novoTema);
      await salvarPreferencia(novoTema);
    } catch (error) {
      console.error('Erro ao alternar modo:', error);
    }
  });

  // 8. Inicialização
  await carregarPreferenciaInicial();
});
</script>
<!-- Script para mostrar nome do usuário -->
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const nomeLogin = document.getElementById("nomelogin");
    const usuarioCorrente = sessionStorage.getItem("usuarioCorrente");

    if (usuarioCorrente) {
      try {
        const userObj = JSON.parse(usuarioCorrente);
        if (userObj && userObj.login) {
          nomeLogin.textContent = userObj.login.toUpperCase();
        }
      } catch (e) {
        console.error("Erro ao carregar usuário:", e);
        nomeLogin.textContent = "LOGIN";
      }
    } else {
      nomeLogin.textContent = "LOGIN";
    }
  });
</script>


  <main>
    <h2>MEUS ROTEIROS</h2>
    <div id="divbtnvoltar">
            <div id="botoes" class="container-fluid">
            <button id="button_voltar" class="btn btn-primary" onclick="history.back()">VOLTAR</button>
        </div>
    </div>

    <ul id="listaRoteiros">
      <!-- Os roteiros serão carregados aqui pelo JavaScript -->
    </ul>
  </main>

  <script>
     document.getElementById("button_voltar").addEventListener("click", function () {
            window.location.href = "crud.html";
        });
    // Função para verificar e carregar o usuário logado
    function verificarUsuarioLogado() {
      const usuarioSalvo = sessionStorage.getItem("usuarioCorrente");
      if (!usuarioSalvo) {
        alert("Você precisa estar logado para acessar esta página");
        window.location.href = "login.html";
        return null;
      }
      return JSON.parse(usuarioSalvo);
    }

    // Função para carregar os roteiros do usuário
    async function carregarRoteiros(usuario) {
      try {
        const resposta = await fetch('http://localhost:3000/roteiros');
        const todosRoteiros = await resposta.json();
        
        // Filtrar apenas os roteiros do usuário logado
        const meusRoteiros = todosRoteiros.filter(r => r.login === usuario.login);
        
        const lista = document.getElementById('listaRoteiros');
        
        if (meusRoteiros.length === 0) {
          lista.innerHTML = `
            <div class="sem-roteiros">
              <i class="far fa-map"></i>
              <h3>Nenhum roteiro encontrado</h3>
              <p>Você ainda não criou nenhum roteiro de viagem.</p>
              <a href="crud.html" class="btn btn-primary">Criar primeiro roteiro</a>
            </div>
          `;
          return;
        }

        // Criar os cards de roteiros
        lista.innerHTML = meusRoteiros.map(roteiro => `
          <li class="roteiro-card">
            <div class="roteiro-header">
              <h3 class="roteiro-cidade">${roteiro.cidade}, ${roteiro.estado}</h3>
              <span class="roteiro-datas">${roteiro.ida} a ${roteiro.volta}</span>
            </div>
            
            <div class="roteiro-detalhes">
              <div class="detalhe-item">
                <strong>Pessoas:</strong>
                <span>${roteiro.pessoas}</span>
              </div>
              <div class="detalhe-item">
                <strong>Orçamento:</strong>
                <span>R$ ${roteiro.orcamento}</span>
              </div>
              <div class="detalhe-item">
                <strong>Preferências:</strong>
                <span>
                  ${roteiro.pet === 'sim' ? 'Pet, ' : ''}
                  ${roteiro.piscina === 'sim' ? 'Piscina, ' : ''}
                  ${roteiro.quartos} quartos,
                  ${roteiro.garagem === 'sim' ? 'Garagem' : 'Sem garagem'}
                </span>
              </div>
            </div>
            
  <div class="roteiro-acoes">
    <button class="btn-acao btn-ver" onclick="verRoteiro(${roteiro.id}, '${roteiro.cidade}')">
      <i class="fas fa-eye"></i> Ver
    </button>
              <button class="btn-acao btn-editar" onclick="editarRoteiro(${roteiro.id})">
                <i class="fas fa-edit"></i> Editar
              </button>
              <button class="btn-acao btn-excluir" onclick="excluirRoteiro(${roteiro.id})">
                <i class="fas fa-trash"></i> Excluir
              </button>
            </div>
          </li>

          
        `).join('');
      } catch (erro) {
        console.error("Erro ao carregar roteiros:", erro);
        alert("Ocorreu um erro ao carregar seus roteiros.");
      }
    }

    // Funções para ações nos roteiros
    function verRoteiro(id, cidade) {
  window.location.href = `roteiro.html?id=${id}&cidade=${encodeURIComponent(cidade)}`;
}

    function editarRoteiro(id) {
      window.location.href = `crud.html?edit=${id}`;
    }

    async function excluirRoteiro(id) {
      if (confirm('Tem certeza que deseja excluir este roteiro?')) {
        try {
          const resposta = await fetch(`http://localhost:3000/roteiros/${id}`, {
            method: 'DELETE'
          });
          
          if (resposta.ok) {
            alert('Roteiro excluído com sucesso!');
            const usuario = verificarUsuarioLogado();
            if (usuario) carregarRoteiros(usuario);
          } else {
            throw new Error('Erro ao excluir roteiro');
          }
        } catch (erro) {
          console.error("Erro ao excluir roteiro:", erro);
          alert("Ocorreu um erro ao excluir o roteiro.");
        }
      }
    }

    // Funções do menu
    function sairConta() {
      sessionStorage.removeItem("usuarioCorrente");
      alert("Você saiu da conta.");
      window.location.href = "index.html";
    }

    function toggleMenu() {
      const menu = document.getElementById('sideMenu');
      menu.classList.toggle('open');
    }

    // Configuração do modo escuro
    function configurarModoEscuro() {
      const darkToggle = document.getElementById('darkModeToggle');
      if (!darkToggle) return;

      // Verificar preferência salva
      const usuario = verificarUsuarioLogado();
      if (!usuario) return;

      fetch(`http://localhost:3000/userPreferences?login=${usuario.login}`)
        .then(res => res.json())
        .then(prefs => {
          const prefUsuario = prefs[0];
          if (prefUsuario?.theme === "dark") {
            document.body.classList.add("dark-mode");
            darkToggle.checked = true;
          }

          // Configurar evento de mudança
          darkToggle.addEventListener('change', function() {
            const novoTema = this.checked ? "dark" : "light";
            document.body.classList.toggle("dark-mode", this.checked);

            if (prefUsuario) {
              fetch(`http://localhost:3000/userPreferences/${prefUsuario.id}`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ theme: novoTema })
              });
            } else {
              fetch(`http://localhost:3000/userPreferences`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  login: usuario.login,
                  theme: novoTema
                })
              });
            }
          });
        })
        .catch(err => console.error("Erro ao carregar preferências:", err));
    }

    // Inicialização da página
    document.addEventListener("DOMContentLoaded", () => {
      // Verificar usuário logado
      const usuario = verificarUsuarioLogado();
      if (!usuario) return;

      // Atualizar nome do usuário no header
      document.getElementById("nomelogin").textContent = usuario.login.toUpperCase();

      // Configurar modo escuro
      configurarModoEscuro();

      // Configurar botão de sair
      const botaoSair = document.getElementById("sair_conta");
      if (botaoSair) {
        botaoSair.addEventListener("click", sairConta);
      }

      // Carregar roteiros do usuário
      carregarRoteiros(usuario);
    });

    // Funções globais para acesso pelos botões
    window.verRoteiro = verRoteiro;
    window.editarRoteiro = editarRoteiro;
    window.excluirRoteiro = excluirRoteiro;
    window.toggleMenu = toggleMenu;
  </script>
</body>
