        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #2196F3;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .recomendacao-detalhes p {

        .recomendacao-detalhes strong {

<script>
window.addEventListener('DOMContentLoaded', async () => {
  // 1. Elementos e Variáveis Iniciais
  const botao = document.getElementById('botao-modo');
  if (!botao) {
    console.error('Botão não encontrado! Verifique o ID "botao-modo" no HTML.');
    return;
  }

  // 2. Obter dados do usuário
  const usuario = JSON.parse(sessionStorage.getItem("usuarioCorrente")) || {};
  const login = usuario?.login?.toLowerCase();

  if (!login) {
    console.warn('Nenhum usuário logado encontrado.');
    return;
  }

  // 3. Variável para armazenar preferência
  let prefUsuario = null;

  // 4. Função para aplicar tema (versão melhorada)
  function aplicarModo(tema) {
    const estiloId = 'modo-escuro-estilos';
    const body = document.body;

    // Remove estilo existente para evitar duplicação
    const estiloExistente = document.getElementById(estiloId);
    if (estiloExistente) estiloExistente.remove();

    if (tema === 'dark') {
      // Cria novo estilo
      const estiloEscuro = document.createElement('style');
      estiloEscuro.id = estiloId;
estiloEscuro.textContent = `
  body.dark-mode {
    background-color: #121212 !important;
    color: #f0f0f0 !important;
    transition: all 0.3s ease;
  }

  body.dark-mode a {
    color: #90caf9 !important;
  }

  body.dark-mode button {
    background-color: #333 !important;
    color: white !important;
    border-color: #555 !important;
  }

  body.dark-mode input,
  body.dark-mode select,
  body.dark-mode textarea {
    background-color: #252525 !important;
    color: white !important;
    border-color: #444 !important;
  }

  /* Exclusão do modo escuro na área "sem-tema" */
  body.dark-mode .sem-tema,
  body.dark-mode .sem-tema * {
    background-color: white !important;
    color: black !important;
    border-color: #ccc !important;
    box-shadow: none !important;
    filter: none !important;
  }



`;

      document.head.appendChild(estiloEscuro);
      body.classList.add('dark-mode');
      botao.textContent = 'MODO CLARO';
      console.log('Modo escuro ativado');
    } else {
      body.classList.remove('dark-mode');
      botao.textContent = 'MODO ESCURO';
      console.log('Modo claro ativado');
    }
  }

  // 5. Função para salvar preferência (com tratamento de erro)
  async function salvarPreferencia(tema) {
    try {
      if (!login) {
        console.error('Tentativa de salvar preferência sem login');
        return;
      }

      const payload = {
        login: login,
        theme: tema
      };

      if (prefUsuario) {
        // Atualização existente
        const response = await fetch(`http://localhost:3000/DarkLight/${prefUsuario.id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...payload, id: prefUsuario.id })
        });
        
        if (!response.ok) throw new Error('Falha ao atualizar preferência');
        console.log('Preferência atualizada com sucesso');
      } else {
        // Nova entrada
        const response = await fetch('http://localhost:3000/DarkLight', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        if (!response.ok) throw new Error('Falha ao criar preferência');
        prefUsuario = await response.json();
        console.log('Preferência criada com sucesso');
      }
    } catch (error) {
      console.error('Erro ao salvar preferência:', error);
    }
  }

  // 6. Carregar preferência inicial (com fallback)
  async function carregarPreferenciaInicial() {
    try {
      const response = await fetch(`http://localhost:3000/DarkLight?login=${login}`);
      if (!response.ok) throw new Error('Falha na requisição');
      
      const prefs = await response.json();
      console.log('Preferências encontradas:', prefs);

      if (prefs.length > 0 && prefs[0].theme) {
        prefUsuario = prefs[0];
        aplicarModo(prefUsuario.theme);
      } else {
        // Fallback: usar preferência do sistema ou light mode
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        aplicarModo(prefersDark ? 'dark' : 'light');
        console.log('Usando preferência do sistema:', prefersDark ? 'dark' : 'light');
      }
    } catch (error) {
      console.error('Erro ao carregar preferência:', error);
      aplicarModo('light'); // Fallback seguro
    }
  }

  // 7. Evento do botão (com tratamento de erro)
  botao.addEventListener('click', async () => {
    try {
      const modoAtual = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
      const novoTema = modoAtual === 'dark' ? 'light' : 'dark';
      
      aplicarModo(novoTema);
      await salvarPreferencia(novoTema);
    } catch (error) {
      console.error('Erro ao alternar modo:', error);
    }
  });

  // 8. Inicialização
  await carregarPreferenciaInicial();
});
</script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const nomeLogin = document.getElementById("nomelogin");

    if (usuarioCorrente) {

        const userObj = JSON.parse(usuarioCorrente);

          nomeLogin.textContent = userObj.login.toUpperCase();
        }
      } catch (e) {
        console.error("Erro ao carregar usuário:", e);
        nomeLogin.textContent = "LOGIN";

    } else {
      nomeLogin.textContent = "LOGIN";
    }

    <main>
                
        <h1>Recomendações para sua viagem</h1>
        <div id="botoes" class="container-fluid">
            <button id="button_voltar" class="btn btn-primary" onclick="history.back()">VOLTAR</button>
        </div>
        <div id="recomendacoes-container"></div>
    </main>

    <script>

        document.getElementById("button_voltar").addEventListener("click", function () {
            window.location.href = "ver.index.html";
        });
        // Seus scripts JavaScript aqui (os mesmos que você já tem)
        document.addEventListener("DOMContentLoaded", () => {
            const toggleCheckbox = document.getElementById("darkModeToggle");
            const userId = 1;

            function applyTheme(theme) {
                document.body.classList.remove("light", "dark");
                document.body.classList.add(theme);
                toggleCheckbox.checked = theme === "dark";
            }

            fetch(`http://localhost:3000/userPreferences/${userId}`)
                .then(res => res.json())
                .then(data => {
                    applyTheme(data.theme || "light");
                })
                .catch(err => {
                    console.error("Erro ao carregar tema:", err);
                    applyTheme("light");
                });

            toggleCheckbox.addEventListener("change", () => {
                const newTheme = toggleCheckbox.checked ? "dark" : "light";
                applyTheme(newTheme);

                fetch(`http://localhost:3000/userPreferences/${userId}`, {
                    method: "PATCH",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ theme: newTheme })
                });
            });

            // Carregar recomendações
            carregarRecomendacoes();
        });

        function toggleMenu() {
            const menu = document.getElementById('sideMenu');
            menu.classList.toggle('open');
        }

        function sairConta() {
            const usuario = sessionStorage.getItem("usuarioCorrente");
            if (!usuario) {
                alert("Nenhum usuário está logado no momento.");
                return;
            }

            sessionStorage.removeItem("usuarioCorrente");
            alert("Você saiu da conta.");
            window.location.href = "index.html";
        }

        // Função para carregar as recomendações
        async function carregarRecomendacoes() {
            const urlParams = new URLSearchParams(window.location.search);
            const cidade = urlParams.get('cidade');
            const idRoteiro = urlParams.get('id');
            
            if (!cidade) {
                document.getElementById('recomendacoes-container').innerHTML = 
                    '<div class="sem-recomendacoes"><i class="fas fa-exclamation-circle"></i><h3>Cidade não especificada</h3><p>Não foi possível identificar a cidade do roteiro.</p></div>';
                return;
            }

            try {
                // Carrega o roteiro para mostrar informações adicionais
                let roteiro = null;
                if (idRoteiro) {
                    const resRoteiro = await fetch(`http://localhost:3000/roteiros/${idRoteiro}`);
                    if (resRoteiro.ok) {
                        roteiro = await resRoteiro.json();
                    }
                }

                // Carrega as recomendações
                const resRecomendacoes = await fetch('http://localhost:3000/recomendacoes_crud');
                const todasRecomendacoes = await resRecomendacoes.json();
                
                // Filtra por cidade
                const recomendacoes = todasRecomendacoes.filter(r => 
                    r.cidade.toLowerCase() === cidade.toLowerCase()
                );

                const container = document.getElementById('recomendacoes-container');
                
                if (recomendacoes.length === 0) {
                    container.innerHTML = `
                        <div class="sem-recomendacoes">
                            <i class="far fa-compass"></i>
                            <h3>Nenhuma recomendação encontrada para ${cidade}</h3>
                            <p>Parece que ainda não temos recomendações cadastradas para esta cidade.</p>
                            <a href="cadastros_recomen.html" class="recom-btn" style="margin-top: 20px; display: inline-block;">
                                <i class="fa-solid fa-plus"></i> Cadastrar Recomendações
                            </a>
                        </div>
                    `;
                    return;
                }

                // Agrupa por tipo
                const porTipo = {
                    passeio: recomendacoes.filter(r => r.tipo === 'passeio'),
                    restaurante: recomendacoes.filter(r => r.tipo === 'restaurante'),
                    hospedagem: recomendacoes.filter(r => r.tipo === 'hospedagem')
                };

                let html = '';
                
                // Se existir roteiro, mostra informações
                if (roteiro) {
                    html += `
                        <div class="roteiro-info">
                            <h2><i class="fas fa-map-marked-alt"></i> Seu Roteiro para ${roteiro.cidade}, ${roteiro.estado}</h2>
                            <div class="recomendacao-card">
                                <p><strong>Data:</strong> ${roteiro.ida} a ${roteiro.volta}</p>
                                <p><strong>Viajantes:</strong> ${roteiro.pessoas} pessoa(s)</p>
                                <p><strong>Orçamento:</strong> R$ ${roteiro.orcamento}</p>
                                <p><strong>Preferências:</strong> 
                                    ${roteiro.pet === 'sim' ? 'Aceita pets, ' : ''}
                                    ${roteiro.piscina === 'sim' ? 'Com piscina, ' : ''}
                                    ${roteiro.quartos} quarto(s),
                                    ${roteiro.garagem === 'sim' ? 'com garagem' : 'sem garagem'}
                                </p>
                            </div>
                        </div>
                    `;
                }

                // Monta as seções de recomendações
                if (porTipo.passeio.length > 0) {
                    html += '<h2><i class="fas fa-umbrella-beach"></i> Passeios</h2>';
                    html += porTipo.passeio.map(passeio => `
                        <div class="recomendacao-card">
                            <div class="recomendacao-header">
                                <h3>${passeio.nome}</h3>
                                <span class="tipo-passeio">Passeio</span>
                            </div>
                            ${passeio.descricao ? `<p class="recomendacao-descricao">${passeio.descricao}</p>` : ''}
                            <div class="recomendacao-detalhes">
                                ${passeio.endereco ? `<p><strong><i class="fas fa-map-marker-alt"></i> Endereço:</strong> ${passeio.endereco}</p>` : ''}
                                ${passeio.preco ? `<p><strong><i class="fas fa-tag"></i> Preço:</strong> ${passeio.preco}</p>` : ''}
                                ${passeio.horario ? `<p><strong><i class="fas fa-clock"></i> Horário:</strong> ${passeio.horario}</p>` : ''}
                            </div>
                            
                        </div>
                    `).join('');
                }

                if (porTipo.restaurante.length > 0) {
                    html += '<h2><i class="fas fa-utensils"></i> Restaurantes</h2>';
                    html += porTipo.restaurante.map(restaurante => `
                        <div class="recomendacao-card">
                            <div class="recomendacao-header">
                                <h3>${restaurante.nome}</h3>
                                <span class="tipo-restaurante">Restaurante</span>
                            </div>
                            ${restaurante.descricao ? `<p class="recomendacao-descricao">${restaurante.descricao}</p>` : ''}
                            <div class="recomendacao-detalhes">
                                ${restaurante.endereco ? `<p><strong><i class="fas fa-map-marker-alt"></i> Endereço:</strong> ${restaurante.endereco}</p>` : ''}
                                ${restaurante.preco ? `<p><strong><i class="fas fa-tag"></i> Faixa de preço:</strong> ${restaurante.preco}</p>` : ''}
                                ${restaurante.horario ? `<p><strong><i class="fas fa-clock"></i> Horário de funcionamento:</strong> ${restaurante.horario}</p>` : ''}
                                ${restaurante.culinaria ? `<p><strong><i class="fas fa-utensil-spoon"></i> Tipo de culinária:</strong> ${restaurante.culinaria}</p>` : ''}
                            </div>
                            
                        </div>
                    `).join('');
                }

                if (porTipo.hospedagem.length > 0) {
                    html += '<h2><i class="fas fa-hotel"></i> Hospedagens</h2>';
                    html += porTipo.hospedagem.map(hospedagem => `
                        <div class="recomendacao-card">
                            <div class="recomendacao-header">
                                <h3>${hospedagem.nome}</h3>
                                <span class="tipo-hospedagem">Hospedagem</span>
                            </div>
                            ${hospedagem.descricao ? `<p class="recomendacao-descricao">${hospedagem.descricao}</p>` : ''}
                            <div class="recomendacao-detalhes">
                                ${hospedagem.endereco ? `<p><strong><i class="fas fa-map-marker-alt"></i> Endereço:</strong> ${hospedagem.endereco}</p>` : ''}
                                ${hospedagem.preco ? `<p><strong><i class="fas fa-tag"></i> Faixa de preço:</strong> ${hospedagem.preco}</p>` : ''}
                                ${hospedagem.quartos ? `<p><strong><i class="fas fa-bed"></i> Quartos:</strong> ${hospedagem.quartos}</p>` : ''}
                                ${hospedagem.comodidades ? `<p><strong><i class="fas fa-check-circle"></i> Comodidades:</strong> ${hospedagem.comodidades}</p>` : ''}
                            </div>
                            
                        </div>
                    `).join('');
                }

                container.innerHTML = html;
            } catch (erro) {
                console.error("Erro ao carregar recomendações:", erro);
                document.getElementById('recomendacoes-container').innerHTML = `
                    <div class="sem-recomendacoes">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Erro ao carregar recomendações</h3>
                        <p>Ocorreu um problema ao carregar as recomendações para esta cidade.</p>
                    </div>
                `;
            }
        }
