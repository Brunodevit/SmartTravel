<script>
window.addEventListener('DOMContentLoaded', async () => {
  // 1. Elementos e Variáveis Iniciais
  const botao = document.getElementById('botao-modo');
  if (!botao) {
    console.error('Botão não encontrado! Verifique o ID "botao-modo" no HTML.');
    return;
  }

  // 2. Obter dados do usuário
  const usuario = JSON.parse(sessionStorage.getItem("usuarioCorrente")) || {};
  const login = usuario?.login?.toLowerCase();

  if (!login) {
    console.warn('Nenhum usuário logado encontrado.');
    return;
  }

  // 3. Variável para armazenar preferência
  let prefUsuario = null;

  // 4. Função para aplicar tema (versão melhorada)
  function aplicarModo(tema) {
    const estiloId = 'modo-escuro-estilos';
    const body = document.body;

    // Remove estilo existente para evitar duplicação
    const estiloExistente = document.getElementById(estiloId);
    if (estiloExistente) estiloExistente.remove();

    if (tema === 'dark') {
      // Cria novo estilo
      const estiloEscuro = document.createElement('style');
      estiloEscuro.id = estiloId;
estiloEscuro.textContent = `
  body.dark-mode {
    background-color: #121212 !important;
    color: #f0f0f0 !important;
    transition: all 0.3s ease;
  }

  body.dark-mode a {
    color: #90caf9 !important;
  }

  body.dark-mode button {
    background-color: #333 !important;
    color: white !important;
    border-color: #555 !important;
  }

  body.dark-mode input,
  body.dark-mode select,
  body.dark-mode textarea {
    background-color: #252525 !important;
    color: white !important;
    border-color: #444 !important;
  }

  /* Exclusão do modo escuro na área "sem-tema" */
  body.dark-mode .sem-tema,
  body.dark-mode .sem-tema * {
    background-color: white !important;
    color: black !important;
    border-color: #ccc !important;
    box-shadow: none !important;
    filter: none !important;
  }



`;

      document.head.appendChild(estiloEscuro);
      body.classList.add('dark-mode');
      botao.textContent = 'MODO CLARO';
      console.log('Modo escuro ativado');
    } else {
      body.classList.remove('dark-mode');
      botao.textContent = 'MODO ESCURO';
      console.log('Modo claro ativado');
    }
  }

  // 5. Função para salvar preferência (com tratamento de erro)
  async function salvarPreferencia(tema) {
    try {
      if (!login) {
        console.error('Tentativa de salvar preferência sem login');
        return;
      }

      const payload = {
        login: login,
        theme: tema
      };

      if (prefUsuario) {
        // Atualização existente
        const response = await fetch(`http://localhost:3000/DarkLight/${prefUsuario.id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...payload, id: prefUsuario.id })
        });
        
        if (!response.ok) throw new Error('Falha ao atualizar preferência');
        console.log('Preferência atualizada com sucesso');
      } else {
        // Nova entrada
        const response = await fetch('http://localhost:3000/DarkLight', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        if (!response.ok) throw new Error('Falha ao criar preferência');
        prefUsuario = await response.json();
        console.log('Preferência criada com sucesso');
      }
    } catch (error) {
      console.error('Erro ao salvar preferência:', error);
    }
  }

  // 6. Carregar preferência inicial (com fallback)
  async function carregarPreferenciaInicial() {
    try {
      const response = await fetch(`http://localhost:3000/DarkLight?login=${login}`);
      if (!response.ok) throw new Error('Falha na requisição');
      
      const prefs = await response.json();
      console.log('Preferências encontradas:', prefs);

      if (prefs.length > 0 && prefs[0].theme) {
        prefUsuario = prefs[0];
        aplicarModo(prefUsuario.theme);
      } else {
        // Fallback: usar preferência do sistema ou light mode
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        aplicarModo(prefersDark ? 'dark' : 'light');
        console.log('Usando preferência do sistema:', prefersDark ? 'dark' : 'light');
      }
    } catch (error) {
      console.error('Erro ao carregar preferência:', error);
      aplicarModo('light'); // Fallback seguro
    }
  }

  // 7. Evento do botão (com tratamento de erro)
  botao.addEventListener('click', async () => {
    try {
      const modoAtual = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
      const novoTema = modoAtual === 'dark' ? 'light' : 'dark';
      
      aplicarModo(novoTema);
      await salvarPreferencia(novoTema);
    } catch (error) {
      console.error('Erro ao alternar modo:', error);
    }
  });

  // 8. Inicialização
  await carregarPreferenciaInicial();
});
</script>

  <!--senha check + scripts-->
  <script>
    function toggleSenha() {
      const input = document.getElementById("senha");

  <script>
    function sairConta() {
      // Verificar se existe um usuário logado
      const usuario = sessionStorage.getItem("usuarioCorrente");


      if (!usuario) {
        alert("Nenhum usuário está logado no momento.");
        return;
      }


      // Limpar o sessionStorage e variáveis
      sessionStorage.removeItem("usuarioCorrente");
      usuarioCorrente = null;


      // Limpar campos se existirem
      if (document.getElementById("login")) document.getElementById("login").value = "";
      if (document.getElementById("nomecompleto")) document.getElementById("nomecompleto").value = "";
      if (document.getElementById("email")) document.getElementById("email").value = "";
      if (document.getElementById("senha")) document.getElementById("senha").value = "";


      // Limpar textos e imagens do perfil, se existirem
      if (document.getElementById("nome-usuario")) document.getElementById("nome-usuario").textContent = "";
      if (document.getElementById("usuario-nome-topo")) document.getElementById("usuario-nome-topo").textContent = "";
      if (document.getElementById("avatar")) document.getElementById("avatar").src = "assets/img/imglogin.png";
      if (document.getElementById("avatar-topo")) document.getElementById("avatar-topo").src = "assets/img/imglogin.png";


      alert("Você saiu da conta.");
      window.location.href = "index.html";
    }


    function toggleMenu() {
      const menu = document.getElementById('sideMenu');
      menu.classList.toggle('open');
    }


    document.getElementById('darkModeToggle')?.addEventListener('change', function () {
      document.body.classList.toggle('dark-mode', this.checked);
    });


    const botaoSair = document.getElementById("sair_conta");
    if (botaoSair) {
      botaoSair.addEventListener("click", sairConta);
    }
  </script>
